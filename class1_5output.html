<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
    // JavaScript code goes here
    // 1. 文档输出内容
    document.write("Hello, World!"); // 输出到文档中
    console.log("Hello, Console!"); // 输出到控制台

    // prompt("请输入你的名字："); // 弹出输入框
    
    // 变量
    let num = 20
    console.log(num); // 输出变量的值

    // 数组
    let arr = ['hi', 'piao', 'qin', 4, 5];
    console.log(arr); // 输出数组
    console.log(arr[0]); // 输出数组的第一个元素
    console.log(arr.length); // 输出数组的长度

    // 声明一个常量
    const PI = 3.14;
    console.log(PI); // 输出常量的值

    // 拼接字符串
    let name = "张三";
    let age = 25;
    document.write('大家好，我叫' + name + '，我今年' + age + '岁。'); // 使用字符串拼接输出
    document.write(`我今年${age}岁了。`); // 使用模板字符串输出
    
    // switch语法
    switch(1){
        case 1:
            console.log("这是数字1");
            break;
        case 2:
            console.log("这是数字2");
            break;
        default:
            console.log("这是其他数字");
    }

    // 声明对象
        let person = {
            name: "李四",
            age: 30,
            city: "北京"
        };
        console.log(person); // 输出对象
        console.log(person.name); // 输出对象的属性值
</script>
</body>
</html>
